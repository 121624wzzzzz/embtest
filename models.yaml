# ==========================================
# 2026 最新大模型批量下载全局配置 (综合版)
# 包含：Qwen系列, Llama-3, Gemma-2, MiniMax, GLM-5 等
# ==========================================
config:
  cache_dir: "./downloaded_models" # 模型保存的根目录
  max_workers: 10                  # 并发下载线程数（需确认：保留了较大的 10）
  max_retries: 10                  # 断线自动重试次数（需确认：保留了较大的 10）

# ==========================================
# 模型分组定义 (按需下载时使用)
# ==========================================
model_groups:
  llama:
    - Llama-3.1-70B-Base
    - Llama-3.1-70B-Instruct
    - Llama-3.1-8B
    - Llama-3.1-8B-Instruct
    - Llama-3.2-1B
    - Llama-3.2-1B-Instruct
    - Llama-3.2-3B
    - Llama-3.2-3B-Instruct
    
  qwen2.5:
    - Qwen2.5-0.5B
    - Qwen2.5-0.5B-Instruct
    - Qwen2.5-1.5B
    - Qwen2.5-1.5B-Instruct
    - Qwen2.5-3B
    - Qwen2.5-3B-Instruct
    - Qwen2.5-7B
    - Qwen2.5-7B-Instruct
    - Qwen2.5-14B
    - Qwen2.5-14B-Instruct
    - Qwen2.5-32B
    - Qwen2.5-32B-Instruct
    - Qwen2.5-72B-Base
    - Qwen2.5-72B-Instruct

  qwen3:
    - Qwen3-0.6B-Base
    - Qwen3-0.6B
    - Qwen3-1.7B-Base
    - Qwen3-1.7B
    - Qwen3-4B-Base
    - Qwen3-4B
    - Qwen3-8B-Base
    - Qwen3-8B
    - Qwen3-14B-Base
    - Qwen3-14B
    - Qwen3-32B
    - Qwen3-30B-A3B

  qwen3.5_dense:
    - Qwen3.5-0.8B-Base
    - Qwen3.5-0.8B-Instruct
    - Qwen3.5-2B-Base
    - Qwen3.5-2B-Instruct
    - Qwen3.5-4B-Base
    - Qwen3.5-4B-Instruct
    - Qwen3.5-9B-Base
    - Qwen3.5-9B-Instruct
    - Qwen3.5-27B-Instruct     # 注：27B 官方无 Base 版

  qwen3.5_moe:
    - Qwen3.5-35B-A3B-Base
    - Qwen3.5-35B-A3B-Instruct
    - Qwen3.5-122B-A10B-Instruct # 注：122B 官方无 Base 版
    - Qwen3.5-397B-A17B-Instruct # 注：397B 官方无 Base 版

  gemma2:
    - Gemma-2-2B
    - Gemma-2-2B-Instruct
    - Gemma-2-9B
    - Gemma-2-9B-Instruct
    - Gemma-2-27B
    - Gemma-2-27B-Instruct

  minimax_m2.5:
    - MiniMax-M2.5-Chat        # 注：MiniMax 官方统一入口

  glm5:
    - GLM-5-744B               # 直接使用统一的代号

  other:
    - Mistral-7B-v0.3
    - Yi-1.5-9B
    - DeepSeek-V2-Lite-Chat

