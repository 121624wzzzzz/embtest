task: task3_cross_scale_groups
reference_models_yaml: models.yaml
reference_series_yaml: model_series.yaml

# 三档规模桶：只生成跨系列 pair，避免重复 task2_model_series 已经覆盖的同系列内部对比。
# 条目为 [base, instruct] 时，默认选最后一个作为代表模型，与 task2_model_series 一致。
selection_rule: instruct_preferred
exclude_same_series: true

scale_groups:
  le_4b:
    # Qwen / Llama / Gemma dense small models
    - [Qwen3-0.6B-Base, Qwen3-0.6B]
    - [Qwen3-1.7B-Base, Qwen3-1.7B]
    - [Qwen3-4B-Base, Qwen3-4B]
    - [Qwen2.5-0.5B, Qwen2.5-0.5B-Instruct]
    - [Qwen2.5-1.5B, Qwen2.5-1.5B-Instruct]
    - [Qwen2.5-3B, Qwen2.5-3B-Instruct]
    - [Llama-3.2-1B, Llama-3.2-1B-Instruct]
    - [Llama-3.2-3B, Llama-3.2-3B-Instruct]
    - [Gemma-2-2B, Gemma-2-2B-Instruct]
    - [Gemma-3-1B, Gemma-3-1B-Instruct]
    - [Gemma-3-4B, Gemma-3-4B-Instruct]
    - [Gemma-4-E2B, Gemma-4-E2B-Instruct]
    - [Gemma-4-E4B, Gemma-4-E4B-Instruct]
    - [Qwen3.5-0.8B-Base, Qwen3.5-0.8B-Instruct]
    - [Qwen3.5-2B-Base, Qwen3.5-2B-Instruct]
    - [Qwen3.5-4B-Base, Qwen3.5-4B-Instruct]

  gt_4b_lt_27b:
    - [Qwen3-8B-Base, Qwen3-8B]
    - [Qwen3-14B-Base, Qwen3-14B]
    - [Qwen2.5-7B, Qwen2.5-7B-Instruct]
    - [Qwen2.5-14B, Qwen2.5-14B-Instruct]
    - [Llama-3.1-8B, Llama-3.1-8B-Instruct]
    - [Gemma-2-9B, Gemma-2-9B-Instruct]
    - [Gemma-3-12B, Gemma-3-12B-Instruct]
    - [Gemma-4-26B-A4B, Gemma-4-26B-A4B-Instruct]
    - [Qwen3.5-9B-Base, Qwen3.5-9B-Instruct]

  ge_27b:
    - Qwen3-32B
    - Qwen3-235B-A22B
