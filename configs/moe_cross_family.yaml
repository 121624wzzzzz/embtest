task: task4_moe_cross_family
reference_models_yaml: models.yaml
reference_series_yaml: model_series.yaml

# 实验四：MoE 专属、仅跨族 GCorr。
# - 仅放 MoE 模型，绝对不含 dense；
# - 复用 task3 的 cross-scale 生成器 + exclude_same_series=true，
#   同 series 的 pair 自动剔除（不重复 task2_model_series 已覆盖的组内对比）；
# - 单桶 7 模型 → C(7,2)=21 跨族 pair，便于尽快出结果。
selection_rule: instruct_preferred
exclude_same_series: true

scale_groups:
  moe_active_compact:
    # qwen3,            A3B / 30B total
    - [Qwen3-30B-A3B-Base, Qwen3-30B-A3B]
    # qwen3.5_moe,      A3B / 35B total
    - [Qwen3.5-35B-A3B-Base, Qwen3.5-35B-A3B-Instruct]
    # qwen3.6,          A3B / 35B total
    - Qwen3.6-35B-A3B
    # gemma4 (MoE 子代), A4B / 26B total
    - [Gemma-4-26B-A4B, Gemma-4-26B-A4B-Instruct]
    # deepseek_v2_moe,  ~A2.4B / 16B total
    - [DeepSeek-V2-Lite, DeepSeek-V2-Lite-Chat]
    # deepseek_r1,      A37B 派生（MoE 主线）
    - DeepSeek-R1-0528
    # minimax_m2,       MoE
    - MiniMax-M2.7
