# ==========================================
# 2026 最新大模型批量下载全局配置 (综合版)
# 包含：Qwen系列, Llama-3, Gemma-2, MiniMax, GLM-5 等
# ==========================================
config:
  cache_dir: "./downloaded_models" # 模型保存的根目录
  extracts_dir: "./extracts"       # 提取产物的统一备份目录（每个模型一份切片 + 元信息）
  max_workers: 10                  # 并发下载线程数（需确认：保留了较大的 10）
  max_retries: 10                  # 断线自动重试次数（需确认：保留了较大的 10）
  verify_extracts: true            # 在备份/清理前重新加载提取的 safetensors，确保可用
  backup_extracts: true            # 把校验通过的提取文件复制到 extracts_dir
  cleanup_originals: true          # 备份成功后删除原始下载的权重以节省空间（不删 tokenizer/config）

# ==========================================
# 模型分组定义 (按需下载时使用)
# ==========================================
