  deepseek_v2_moe:
    - DeepSeek-V2-Lite
    - DeepSeek-V2-Lite-Chat   # 注：V2 Lite 同一基模的聊天版；V2 Lite 属于早期 MoE 轻量支线

  deepseek_v3_moe:
    - DeepSeek-V3-Base
    - DeepSeek-V3             # 注：V3 主线 MoE 基模家族，当前主仓名不带 -Chat 后缀
    - DeepSeek-V3.1-Base
    - DeepSeek-V3.1           # 注：V3.1 与 V3 属同一主线的后续版本
    - DeepSeek-V3.2           # 注：V3.2 与 V3/V3.1 同属 V3 主线；当前魔搭公开仓仅此主版本
    - DeepSeek-V3.2-Speciale  # 注：V3.2 高算力特化版，仍属于 V3.2 主线

  deepseek_v4_moe:
    - DeepSeek-V4-Flash
    - DeepSeek-V4-Pro

  deepseek_r1:
    - DeepSeek-R1             # 注：R1 为推理强化版本，通常视作基于 DeepSeek-V3 主线演化
    - DeepSeek-R1-0528        # 注：R1 的后续修订版

  deepseek_r1_distill_qwen:
    - DeepSeek-R1-Distill-Qwen-1.5B  # 对应 Qwen2.5-1.5B 基模
    - DeepSeek-R1-Distill-Qwen-7B    # 对应 Qwen2.5-7B 基模
    - DeepSeek-R1-Distill-Qwen-14B   # 对应 Qwen2.5-14B 基模
    - DeepSeek-R1-Distill-Qwen-32B   # 对应 Qwen2.5-32B 基模

  deepseek_r1_distill_llama:
    - DeepSeek-R1-Distill-Llama-8B   # 对应 Llama-3.1-8B 基模
    - DeepSeek-R1-Distill-Llama-70B  # 对应 Llama-3.1-70B 基模；R1 蒸馏到 Llama 基模，非 DeepSeek 自有基模

  other: []

